[Settings]
source_file = config/user_demo.txt
final_file = output/user_result.txt
cdn_url = https://g.blfrp.cn/

# 港澳台台经常是 IPv6 源，不要强制 IPv4
ipv_type = all
ipv_type_prefer = ipv4

# 归属地放宽——加上港澳台和海外，否则会被过滤掉
location = 

# 海外频道分辨率门槛降低（很多 Bloomberg 源只有 540p）
min_resolution = 854x480

# 测速超时放宽到 8 秒（海外源延迟天然就高）
speed_test_timeout = 8

# 单频道接口数量
urls_limit = 5

# 开启补偿机制：实在找不到符合条件的源，宁可放低质量也不空台
open_supply = True

# 关掉自动停用失效源（防止 GitHub 这种间歇性失败的源被永久禁用）
open_auto_disable_source = False

open_rtmp = False

